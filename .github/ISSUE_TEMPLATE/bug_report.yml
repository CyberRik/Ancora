name: Bug report
description: Something isn't working as expected.
title: "bug: <summary>"
labels: ["type:bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Include the observed vs. expected behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Start the stack with `make up`
        2. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, Docker version, commit SHA, deployment mode"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / trace IDs
      render: shell
