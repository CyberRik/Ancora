# Ancora local stack (Phase 0).
# Brings up Temporal + Postgres + Redis + API Gateway + dashboard.
#   docker compose -f deploy/docker/docker-compose.yml up --build
#
# Build context is the repo root (../..) so the API image can see the uv workspace.
name: ancora

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ancora
      POSTGRES_PASSWORD: ancora
      POSTGRES_DB: ancora
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ancora"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.25.2
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=ancora
      - POSTGRES_PWD=ancora
      - POSTGRES_SEEDS=postgres
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

  temporal-ui:
    image: temporalio/ui:2.31.2
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    ports:
      - "8233:8080"

  # One-shot: apply Alembic migrations before the API starts serving.
  migrate:
    build:
      context: ../..
      dockerfile: services/api-gateway/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ANCORA_DATABASE_URL=postgresql+asyncpg://ancora:ancora@postgres:5432/ancora
    working_dir: /app/services/api-gateway
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  api:
    build:
      context: ../..
      dockerfile: services/api-gateway/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      - ANCORA_ENVIRONMENT=development
      - ANCORA_DATABASE_URL=postgresql+asyncpg://ancora:ancora@postgres:5432/ancora
      - ANCORA_TEMPORAL_ADDRESS=temporal:7233
      - ANCORA_TEMPORAL_NAMESPACE=default
      - ANCORA_TASK_QUEUE=ancora-default
      - ANCORA_REDIS_URL=redis://redis:6379/0
      - ANCORA_CORS_ORIGINS=["http://localhost:3000"]
      # Poll for changes: Docker Desktop bind mounts don't deliver inotify events.
      - WATCHFILES_FORCE_POLLING=true
    ports:
      - "8080:8080"
    volumes:
      - ../../services/api-gateway:/app/services/api-gateway
      - ../../packages/sdk-python:/app/packages/sdk-python
      - ../../packages/common:/app/packages/common
    # Hot reload: watch the service *and* the shared packages so edits to
    # ancora_common / the SDK also restart the server.
    command: [
      "uvicorn", "ancora_api.main:app", "--host", "0.0.0.0", "--port", "8080",
      "--reload",
      "--reload-dir", "/app/services/api-gateway",
      "--reload-dir", "/app/packages/common",
      "--reload-dir", "/app/packages/sdk-python",
    ]

  worker:
    build:
      context: ../..
      dockerfile: services/workflow-workers/Dockerfile
    depends_on:
      temporal:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      - ANCORA_DATABASE_URL=postgresql+asyncpg://ancora:ancora@postgres:5432/ancora
      - ANCORA_TEMPORAL_ADDRESS=temporal:7233
      - ANCORA_TEMPORAL_NAMESPACE=default
      - ANCORA_TASK_QUEUE=ancora-default
      - WATCHFILES_FORCE_POLLING=true
    volumes:
      - ../../services/workflow-workers:/app/services/workflow-workers
      - ../../packages/sdk-python:/app/packages/sdk-python
      - ../../packages/common:/app/packages/common
    # Hot reload: restart the worker whenever workflow/activity or shared code changes.
    command: [
      "watchfiles", "--filter", "python", "ancora-worker",
      "/app/services/workflow-workers", "/app/packages",
    ]
    restart: on-failure

  # Activity worker (execution runtime). Defaults to the in-process LocalBackend;
  # set ANCORA_RAY_ADDRESS to attach to the `ray-head` service (profile: ray).
  activity-worker:
    build:
      context: ../..
      dockerfile: services/activity-workers/Dockerfile
    depends_on:
      temporal:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - ../../.env
    environment:
      - ANCORA_DATABASE_URL=postgresql+asyncpg://ancora:ancora@postgres:5432/ancora
      - ANCORA_TEMPORAL_ADDRESS=temporal:7233
      - ANCORA_TEMPORAL_NAMESPACE=default
      - ANCORA_REDIS_URL=redis://redis:6379/0
      - ANCORA_POOLS=["cpu","io"]
      - ANCORA_TOTAL_CPUS=4
      - WATCHFILES_FORCE_POLLING=true
      # - ANCORA_RAY_ADDRESS=ray://ray-head:10001   # enable with --profile ray
    volumes:
      - ../../services/activity-workers:/app/services/activity-workers
      - ../../packages/sdk-python:/app/packages/sdk-python
      - ../../packages/common:/app/packages/common
    # Hot reload: restart the activity worker when node/runtime or shared code changes.
    command: [
      "watchfiles", "--filter", "python", "ancora-activity-worker",
      "/app/services/activity-workers", "/app/packages",
    ]
    restart: on-failure

  # Optional Ray head (AN-025). Off by default to keep `make up` light and
  # reliable; start it with:  docker compose --profile ray up
  ray-head:
    image: rayproject/ray:2.9.3-py311
    profiles: ["ray"]
    command: >
      ray start --head --port=6379 --ray-client-server-port=10001
      --dashboard-host=0.0.0.0 --block
    ports:
      - "10001:10001"   # ray client
      - "8265:8265"     # ray dashboard
    shm_size: "2gb"

  web:
    build:
      context: ../..
      dockerfile: web/Dockerfile
      # Build only the deps stage (node_modules + pnpm); run `next dev` against the
      # mounted source so edits hot-reload via Fast Refresh instead of needing a
      # rebuild. For a production image, drop `target` (defaults to the runner stage).
      target: deps
    depends_on:
      - api
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
      - NEXT_TELEMETRY_DISABLED=1
      - WATCHPACK_POLLING=true
    ports:
      - "3000:3000"
    volumes:
      - ../../web:/app
      - /app/node_modules
      - /app/.next
    command: ["pnpm", "dev"]

volumes:
  pgdata:
