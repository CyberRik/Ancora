[project]
name = "ancora"
version = "0.1.0"
description = "Ancora SDK — author durable AI workflows."
requires-python = ">=3.11"
readme = "README.md"
license = { text = "Apache-2.0" }
dependencies = [
    "pydantic>=2.6",
    "temporalio>=1.9,<2",
    "httpx>=0.27.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ancora"]
