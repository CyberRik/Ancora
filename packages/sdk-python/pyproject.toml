[project]
name = "ancora"
version = "0.1.0"
description = "Ancora SDK — author durable AI workflows (Phase 0 stub; core lands in Phase 1)."
requires-python = ">=3.11"
readme = "README.md"
license = { text = "Apache-2.0" }
dependencies = [
    "pydantic>=2.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ancora"]
