[project]
name = "ancora-cli"
version = "0.1.0"
description = "Ancora command-line interface."
requires-python = ">=3.11"
readme = "README.md"
license = { text = "Apache-2.0" }
dependencies = [
    "typer>=0.15",
    "rich>=13.9",
    "httpx>=0.28",
    "ancora",
]

[project.scripts]
ancora = "ancora_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ancora_cli"]
